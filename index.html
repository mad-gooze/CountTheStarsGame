<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>Count The Stars - a simple meditative game</title>
    <link rel="icon" type="image/png" href="./img/icon.png" />
    <script type="module" crossorigin src="./assets/index-DAgQGTSv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BpcFKuYR.css">
  </head>
  <body class="game">
    <div class="bg-stars"></div>
    <div class="menu-wrapper">
      <div class="menu">
        <div class="menu__screen menu__screen_start menu__screen_inactive">
          <h1 data-i18n="heading">Count The Stars</h1>
          <p class="menu__text" data-i18n="intro">
            Count the stars by clicking them as they appear in the sky. Try to
            count as many of them as you can.
          </p>
          <h2 class="menu__btn menu__btn_start-game" data-i18n="start">Start</h2>
          <p class="menu__best"></p>
        </div>
        <div class="menu__screen menu__screen_end-game menu__screen_inactive">
          <h1 class="menu__text_end-score">You have counted 0 stars</h1>
          <p class="menu__record"></p>
          <p class="menu__best"></p>
          <div class="menu__line">
            <h3 class="menu__btn menu__btn_retry menu__btn_center">
              <span class="icon-arrows-cw"></span>
              <span data-i18n="retry">Retry</span>
            </h3>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="control control_sound control_vertical-centered control_hidden">
        <div class="control__btn icon-volume-high"></div>
        <div class="control__text control__text_song-name">caption</div>
      </div>
    </div>
    <div class="stars-holder-wrapper">
      <div class="stars-holder stars-holder_inactive"></div>
    </div>

    <div class="controls controls_wrap">
      <div class="control control_scores control_vertical-centered control_hidden">
        <div class="control__text" data-i18n="countedStars">Counted stars:</div>
        <div class="control__count"></div>
      </div>
      <div class="control control_mistakes control_vertical-centered control_hidden">
        <div class="control__text" data-i18n="mistakesLeft">Mistakes left:</div>
      </div>
    </div>
    <div class="clouds"></div>
  </body>
</html>
